<footer class="bg-slate-900 text-white py-6">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Brand -->
            <div>
                <div class="flex items-center space-x-2 mb-2">
                    <div class="w-8 h-8 rounded-lg gradient-bg flex items-center justify-center">
                        <span class="text-white font-bold text-sm">⚡</span>
                    </div>
                    <span class="font-heading font-bold text-lg">SmartGridBlog</span>
                </div>
                <p class="text-slate-400 text-xs">
                    Power Systems & Renewable Energy Insights
                </p>
            </div>

            <!-- Quick Links -->
            <div>
                <h4 class="font-heading font-semibold mb-2 text-sm">Quick Links</h4>
                <ul class="space-y-1 text-sm">
                    <li><a href="{% url 'core:home' %}" class="text-slate-400 hover:text-primary-400 transition-colors">Home</a></li>
                    <li><a href="{% url 'core:about' %}" class="text-slate-400 hover:text-primary-400 transition-colors">About</a></li>
                    <li><a href="{% url 'projects:project_list' %}" class="text-slate-400 hover:text-primary-400 transition-colors">Projects</a></li>
                    <li><a href="{% url 'blog:blog_list' %}" class="text-slate-400 hover:text-primary-400 transition-colors">Blog</a></li>
                </ul>
            </div>

            <!-- Social Links -->
            <div>

                <div class="flex space-x-3">
                    {% if profile.github %}

            <div class="border-t border-slate-800 mt-4 pt-4 text-center text-slate-400 text-xs">
