databases:
  - name: portofolio_db
    databaseName: portofolio_db
    plan: free

services:
  - type: web
    name: portofolio
    env: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn portofolio.wsgi:application --bind 0.0.0.0:8000
    healthCheckPath: /
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portofolio_db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: portoapp.onrender.com
      - key: DEBUG
        value: false
